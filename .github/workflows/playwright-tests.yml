YAML
name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        # FIX: Ensure this path matches your repository structure 
        # If your lock file is in the root, remove 'automation-framework/'
        cache: 'yarn'
        cache-dependency-path: 'automation-framework/yarn.lock'

    - name: Install dependencies
      # If using the subfolder, run: cd automation-framework && yarn install
      run: yarn install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      # Runs tests in parallel with automatic retries as per your framework config
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30